<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
   
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> <!-- Load jQuery -->

    <style>
    #map{ 
      height: 800px;
      width: 100%; }
    </style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Squirrel - Step 0</title>

</head>
<body>
  <div id="map"></div>

  <script>
  // initialize the map centered on the geographic center of the lower 48
  var map = L.map('map').setView([39.833, -98.35], 4);

  // load tile layer from leaflet we copied earlier and use the required attribution
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
      minZoom: 4
    }).addTo(map);

  // load the geojson rat types and lcoation file saved in this directory
 
    $.getJSON("data/ssa-capitals.geojson", function(data) {
      var squirrelIcon = L.icon({
        iconUrl: "images/squirrel-king-icon.png",
        iconSize:[48,48]
      });
      L.geoJSON(data,{
      pointToLayer: function(feature,latlng){
      var marker = L.marker(latlng,{
      icon: squirrelIcon
      });
      marker.bindPopup('<b>Name: </b>' + feature.properties.FeatureNa + '<br/>' + '<b>Elevation: </b>' + feature.properties.elev);
        return marker;
      }
      }).addTo(map);
    });
  </script>
  
</body>
</html>
