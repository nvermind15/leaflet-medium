<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
   
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script> <!-- Load jQuery -->

    <style>
    #map{ 
      height: 800px;
      width: 100%; }
    </style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet Squirrel - Step 0</title>

</head>
<body>
    <style>
    .custom-popup .leaflet-popup-content-wrapper {
      background: rgba(70, 145, 158, 0.7);
      color: #fff;
      font-size: 12px;
      font-family: 'Comic Sans MS', monospace;
      line-height: 18px;
    }
    .custom-popup .leaflet-popup-content-wrapper a {
      color: rgba(255, 255, 255, 0.1);
    }
    .custom-popup .leaflet-popup-tip-container {
      margin: 0 auto;
      width: 40px;
      height: 20px;
      position: relative;
      overflow: hidden;
    }
    .custom-popup .leaflet-popup-tip {
      width: 15px;
      height: 15px;
      padding: 1px;
      margin: -8px auto 0;
      -moz-transform: rotate(45deg);
      -webkit-transform: rotate(45deg);
      -ms-transform: rotate(45deg);
      -o-transform: rotate(45deg);
      transform: rotate(45deg);
      background: rgba(70, 145, 158, 0.7);
    }
  </style>
  <div id="map"></div>

  <script>
  // initialize the map centered on the geographic center of the lower 48
  var map = L.map('map').setView([39.833, -98.35], 4);

  // load tile layer from leaflet we copied earlier and use the required attribution
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
      minZoom: 4
    }).addTo(map);

    var statesStyle = {
    "color":"#000000",
    "weight": 2,
    "fillColor": "#ffffff",
    "fillOpacity":0
  };

  // load the geojson states
   $.getJSON("data/ssa-states.geojson", function(stateData){
    L.geoJson(stateData, {
      style: statesStyle
    }).addTo(map);
      });

    // load the geojson file with the squirrel locations and the custom icon for the markers
    $.getJSON("data/ssa-capitals.geojson", function(data) {
      var squirrelIcon = L.icon({
        iconUrl: "images/squirrel-king-icon.png",
        iconSize:[48,48]
      });

      //use the pointToLayer option to create a marker with the custom icon and bind a popup to it with the name and elevation of the squirrel
      L.geoJSON(data,{
      pointToLayer: function(feature,latlng){
      var marker = L.marker(latlng,{
      icon: squirrelIcon
      });
      marker.bindPopup('<b>Name: </b>' + feature.properties.FeatureNa + '<br/>' + '<b>Elevation: </b>' + feature.properties.elev,
      {className: 'custom-popup'});
      return marker;
      }
      }).addTo(map);
    });
  </script>
  
</body>
</html>
